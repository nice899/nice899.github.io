<!DOCTYPE html>
<html>
<head>
  <title>Hacker Profile</title>
  <style>
    body {
      background: black;
      color: #00ff00;
      font-family: "Courier New", monospace;
      text-align: center;
      padding: 40px;
    }

    h1 {
      font-size: 40px;
      text-shadow: 0 0 10px #00ff00;
    }

    .box {
      border: 1px solid #00ff00;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      box-shadow: 0 0 15px #00ff00;
    }

    a {
      color: #00ff00;
      display: block;
      margin: 10px;
      text-decoration: none;
    }

    a:hover {
      color: red;
    }

    .blink {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }
  </style>
</head>

<body>

  <h1>ACCESS GRANTED</h1>
  <p class="blink">>> SYSTEM ONLINE...</p>

  <div class="box">
    <h2>[ USER PROFILE ]</h2>
    <p>Name: Hala Madrid</p>
    <p>Status: Online</p>
    <p>Role: Web Dev / Creator</p>
  </div>

  <div class="box">
    <h2>[ SKILLS ]</h2>
    <p>HTML</p>
    <p>CSS</p>
    <p>Roblox Studio</p>
  </div>

  <div class="box">
    <h2>[ CONNECT ]</h2>
    <a href="#">YouTube</a>
    <a href="#">TikTok</a>
  </div>

</body>
</html>
