<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>
body{
  margin:0;
  background:#0f0f0f;
  color:#00ff88;
  font-family:Courier New, monospace;
  scroll-behavior:smooth;
}

header{
  text-align:center;
  padding:50px 20px;
}

.profile{
  width:180px;
  border-radius:50%;
  border:3px solid #00ff88;
  box-shadow:0 0 30px #00ff88;
}

h1{
  margin:15px 0 5px;
  font-size:35px;
}

section{
  max-width:700px;
  margin:40px auto;
  padding:20px;
  border:1px solid #00ff88;
  box-shadow:0 0 15px #00ff88;
  opacity:0;
  transform:translateY(40px);
  transition:0.6s;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

h2{
  border-bottom:1px solid #00ff88;
  padding-bottom:10px;
}

.skill{
  margin:15px 0;
}

.bar{
  height:10px;
  background:#003322;
  border-radius:10px;
  overflow:hidden;
}

.progress{
  height:10px;
  background:#00ff88;
  width:0;
  transition:1s;
}

a.button{
  display:inline-block;
  margin:10px 5px;
  padding:10px 20px;
  border:1px solid #00ff88;
  text-decoration:none;
  color:#00ff88;
  transition:0.3s;
}

a.button:hover{
  background:#00ff88;
  color:black;
}
footer{
  text-align:center;
  margin:40px 0;
  font-size:14px;
}
</style>
</head>

<body>

<header>
  <img src="IMG_20260128_143022.jpg" class="profile">
  <h1>Solihen</h1>
  <p>Web Developer | Gamer | Creator</p>

</header>

<section>
  <h2>About Me</h2>
  <p>
    ☠️☠️☠️☠️☠️☠️☠️☠️☠️☠️
  </p>
</section>

<section>
  <h2>Skills</h2>

  <div class="skill">
    HTML
    <div class="bar"><div class="progress" style="width:90%"></div></div>
  </div>

  <div class="skill">
    CSS
    <div class="bar"><div class="progress" style="width:80%"></div></div>
  </div>

  <div class="skill">
    JavaScript
    <div class="bar"><div class="progress" style="width:70%"></div></div>
  </div>

  <div class="skill">
    Roblox Script
    <div class="bar"><div class="progress" style="width:85%"></div></div>
  </div>

</section>

<section>
  <h2>Contact</h2>
  <a href="https://www.youtube.com/@BC.AN90" class="button">Youtube</a>
  <a href="#" class="button">Discord</a>
  <a href="#" class="button">GitHub</a>
</section>

<footer>
  © 2026 Your Name
</footer>

<script>
const sections=document.querySelectorAll("section");

window.addEventListener("scroll",()=>{
  sections.forEach(sec=>{
    const top=sec.getBoundingClientRect().top;
    if(top<window.innerHeight-100){
      sec.classList.add("show");
    }
  });
});
</script>

</body>
</html>
