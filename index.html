<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aiman | Profile</title>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:#00ff88;
  font-family:Courier New, monospace;
  text-align:center;
  overflow-x:hidden;
}

header{
  padding:60px 20px 30px;
  position:relative;
}

.profile{
  width:170px;
  border-radius:50%;
  border:3px solid #00ff88;
  box-shadow:0 0 25px #00ff88;
  position:relative;
  z-index:3;
}

/* เอฟเฟกต์ตก */
.fall{
  animation:drop 0.6s ease-in forwards;
}

@keyframes drop{
  0%{transform:translateY(-300px);}
  100%{transform:translateY(0);}
}

/* แตก */
.piece{
  position:absolute;
  width:60px;
  border-radius:50%;
  pointer-events:none;
  animation:explode 1s ease-out forwards;
  z-index:4;
}

@keyframes explode{
  0%{transform:translate(0,0) scale(1); opacity:1;}
  100%{
    transform:translate(var(--x), var(--y)) scale(0.4);
    opacity:0;
  }
}

/* ===== Picture Rain ===== */
.rain{
  position:fixed;
  top:-120px;
  border-radius:50%;
  pointer-events:none;
  animation-name:rainDrop;
  animation-timing-function:linear;
  animation-fill-mode:forwards;
  z-index:1;
}

@keyframes rainDrop{
  from{ transform:translateY(0); opacity:1; }
  to{ transform:translateY(120vh); opacity:0.3; }
}

/* ===== FULLSCREEN JUMPSCARE ===== */
#jumpscareLayer{
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  background:black;
  display:none;
  z-index:99999;
}

#jumpscareLayer img{
  width:100vw;
  height:100vh;
  object-fit:cover;
}

/* กระพริบแรง */
.flash{
  animation:flashEffect 0.08s infinite alternate;
}

@keyframes flashEffect{
  from{filter:brightness(0.5) contrast(1);}
  to{filter:brightness(1.8) contrast(2);}
}

/* สั่นจอ */
.shake{
  animation:shakeEffect 0.05s infinite;
}

@keyframes shakeEffect{
  0%{transform:translate(0,0);}
  25%{transform:translate(8px,-8px);}
  50%{transform:translate(-8px,8px);}
  75%{transform:translate(8px,8px);}
  100%{transform:translate(-8px,-8px);}
}

h1{ margin:15px 0 5px; font-size:32px; }
.subtitle{ opacity:0.8; }

section{
  max-width:700px;
  margin:30px auto;
  padding:25px;
  border:1px solid #00ff88;
  box-shadow:0 0 15px #00ff88;
  position:relative;
  z-index:2;
}

.button{
  display:inline-block;
  margin:10px 5px;
  padding:10px 20px;
  border:1px solid #00ff88;
  color:#00ff88;
  background:none;
  cursor:pointer;
}

.button:hover{
  background:#00ff88;
  color:black;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  z-index:1;
}

footer{
  text-align:center;
  margin:40px 0;
  font-size:14px;
  opacity:0.7;
  position:relative;
  z-index:2;
}
</style>
</head>

<body>

<header>
  <img src="IMG_20251215_185854.jpg" class="profile">
  <h1>Aiman</h1>
  <p class="subtitle">Web Developer | Gamer | Creator</p>
</header>

<section>
  <h2>About Me</h2>
  <p>☠️ Dark Mode Activated ☠️</p>

  <button class="button" onclick="toggleMatrix()">Show / Hide Matrix</button>
  <button class="button" onclick="explodePic()">Explode Picture 💥</button>
  <button class="button" onclick="pictureRain()">Picture Rain 🌧️</button>
  <button class="button" onclick="triggerJumpscare()">Jumpscare 💀</button>
</section>

<section>
  <h2>Contact</h2>
  <a href="https://www.youtube.com/@BC.AN90" target="_blank" class="button">YouTube</a>
  <a href="https://github.com/nice899" target="_blank" class="button">GitHub</a>
  <a href="https://www.instagram.com/niaiman_444" target="_blank" class="button">Instagram</a>
</section>

<canvas id="matrix"></canvas>

<!-- JUMPSCARE FULLSCREEN -->
<div id="jumpscareLayer">
  <img src="IMG_20260128_143022.jpg">
</div>

<audio id="Scary Screamer - Sound Effect Free.mp3" src="scare.mp3"></audio>

<footer>
  © 2026 Aiman
</footer>

<script>
let interval;
let running = false;

/* ================= Matrix ================= */
function toggleMatrix(){
  const canvas=document.getElementById("matrix");
  const ctx=canvas.getContext("2d");

  if(running){
    clearInterval(interval);
    canvas.style.display="none";
    running=false;
    return;
  }

  canvas.style.display="block";
  canvas.height=window.innerHeight;
  canvas.width=window.innerWidth;

  const letters="01";
  const fontSize=16;
  const columns=canvas.width/fontSize;
  const drops=[];

  for(let x=0;x<columns;x++) drops[x]=1;

  function draw(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#00ff88";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
      const text=letters.charAt(Math.floor(Math.random()*letters.length));
      ctx.fillText(text,i*fontSize,drops[i]*fontSize);
      if(drops[i]*fontSize>canvas.height&&Math.random()>0.975)
        drops[i]=0;
      drops[i]++;
    }
  }

  interval=setInterval(draw,33);
  running=true;
}

/* ================= Explode ================= */
function explodePic(){
  const pic=document.querySelector(".profile");
  const header=document.querySelector("header");

  pic.classList.remove("fall");
  void pic.offsetWidth;
  pic.classList.add("fall");

  setTimeout(()=>{
    for(let i=0;i<14;i++){
      const piece=document.createElement("img");
      piece.src=pic.src;
      piece.className="piece";
      piece.style.left=pic.offsetLeft+55+"px";
      piece.style.top=pic.offsetTop+55+"px";
      piece.style.setProperty("--x",(Math.random()*500-250)+"px");
      piece.style.setProperty("--y",(Math.random()*500-250)+"px");
      header.appendChild(piece);
      setTimeout(()=>piece.remove(),1000);
    }
  },600);
}

/* ================= Picture Rain ================= */
function pictureRain(){
  const imageSrc=document.querySelector(".profile").src;

  for(let i=0;i<80;i++){
    const img=document.createElement("img");
    img.src=imageSrc;
    img.className="rain";
    img.style.left=Math.random()*window.innerWidth+"px";
    img.style.width=(Math.random()*60+30)+"px";
    img.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(img);

    setTimeout(()=>img.remove(),4000);
  }
}

/* ================= FULLSCREEN JUMPSCARE ================= */
function triggerJumpscare(){
  const layer=document.getElementById("jumpscareLayer");
  const sound=document.getElementById("jumpscareSound");

  layer.style.display="block";
  layer.classList.add("flash");
  document.body.classList.add("shake");

  sound.currentTime=0;
  sound.play();

  setTimeout(()=>{
    layer.style.display="none";
    layer.classList.remove("flash");
    document.body.classList.remove("shake");
  },2500);
}
</script>

</body>
</html>
